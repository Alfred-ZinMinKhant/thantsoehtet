<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aston Martin DB11 — Interactive 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: #e8e8e8;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    /* ── Top title ── */
    #title-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 0 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,.8), transparent);
      z-index: 10;
      pointer-events: none;
    }
    #title-bar h1 {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #c9a84c;
      text-shadow: 0 0 30px rgba(201,168,76,.5);
    }
    #title-bar span {
      font-size: 11px;
      color: #888;
      letter-spacing: 3px;
      display: block;
      text-align: center;
      margin-top: 3px;
    }

    /* ── Side panel ── */
    #panel {
      position: fixed;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      background: rgba(10,10,20,.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(201,168,76,.2);
      border-radius: 14px;
      padding: 24px 20px;
      z-index: 10;
      width: 210px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    #panel h2 {
      font-size: 10px;
      letter-spacing: 4px;
      color: #c9a84c;
      text-transform: uppercase;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(201,168,76,.2);
      padding-bottom: 10px;
    }

    .control-group { margin-bottom: 16px; }
    .control-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Color swatches */
    .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .15s, border-color .15s;
    }
    .swatch:hover  { transform: scale(1.15); }
    .swatch.active { border-color: #c9a84c; }

    /* Sliders */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #c9a84c;
      cursor: pointer;
    }
    .slider-val {
      font-size: 10px;
      color: #666;
      text-align: right;
      margin-top: 4px;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid rgba(201,168,76,.35);
      border-radius: 8px;
      background: rgba(201,168,76,.05);
      color: #c9a84c;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .btn:hover  { background: rgba(201,168,76,.15); border-color: #c9a84c; }
    .btn.active { background: rgba(201,168,76,.25); border-color: #c9a84c; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 14px 0;
    }

    /* ── Bottom hint ── */
    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,.25);
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity .8s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 60px; height: 60px;
      border: 2px solid rgba(201,168,76,.15);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      font-size: 11px;
      letter-spacing: 4px;
      color: #888;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loader-ring"></div>
  <p>Initialising</p>
</div>

<!-- Canvas -->
<div id="canvas-container"></div>

<!-- Title -->
<div id="title-bar">
  <div>
    <h1>Aston Martin DB11</h1>
    <span>Interactive 3D Configurator</span>
  </div>
</div>

<!-- Control panel -->
<div id="panel">
  <h2>Configure</h2>

  <div class="control-group">
    <label>Body Colour</label>
    <div class="swatch-row" id="body-swatches">
      <div class="swatch active" style="background:#1a3a6e;" data-color="#1a3a6e" title="Racing Blue"></div>
      <div class="swatch" style="background:#1a1a1a;" data-color="#1a1a1a" title="Jet Black"></div>
      <div class="swatch" style="background:#c9a84c;" data-color="#c9a84c" title="Champagne Gold"></div>
      <div class="swatch" style="background:#8b0000;" data-color="#8b0000" title="Volcano Red"></div>
      <div class="swatch" style="background:#2d5a2d;" data-color="#2d5a2d" title="British Racing Green"></div>
      <div class="swatch" style="background:#f0f0f0;" data-color="#f0f0f0" title="Stratus White"></div>
    </div>
  </div>

  <div class="control-group">
    <label>Wheel Finish</label>
    <div class="swatch-row" id="wheel-swatches">
      <div class="swatch active" style="background:#c0c0c0;" data-color="#c0c0c0" title="Polished Silver"></div>
      <div class="swatch" style="background:#1a1a1a;" data-color="#1a1a1a" title="Gloss Black"></div>
      <div class="swatch" style="background:#c9a84c;" data-color="#c9a84c" title="Gold Sport"></div>
      <div class="swatch" style="background:#8b7355;" data-color="#8b7355" title="Bronze"></div>
    </div>
  </div>

  <div class="control-group">
    <label>Roughness — <span id="roughness-val">0.35</span></label>
    <input type="range" id="roughness" min="0" max="100" value="35" />
  </div>

  <div class="control-group">
    <label>Clearcoat — <span id="clearcoat-val">1.0</span></label>
    <input type="range" id="clearcoat" min="0" max="100" value="100" />
  </div>

  <div class="control-group">
    <label>Metalness — <span id="metalness-val">0.9</span></label>
    <input type="range" id="metalness" min="0" max="100" value="90" />
  </div>

  <hr class="divider" />

  <div class="control-group">
    <label>View</label>
    <div class="btn-row">
      <button class="btn" id="btn-front">Front</button>
      <button class="btn" id="btn-side">Side</button>
      <button class="btn" id="btn-top">Top</button>
    </div>
  </div>

  <div class="control-group">
    <div class="btn-row">
      <button class="btn" id="btn-autorotate">Auto Rotate</button>
      <button class="btn" id="btn-reset">Reset</button>
    </div>
  </div>

  <div class="control-group">
    <label>Environment</label>
    <div class="btn-row">
      <button class="btn active" id="env-studio">Studio</button>
      <button class="btn" id="env-night">Night</button>
    </div>
  </div>
</div>

<div id="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  OrbitControls (inlined, r134-compatible)
// ─────────────────────────────────────────────
(function () {
  "use strict";
  const _changeEvent = { type: "change" };
  const _startEvent  = { type: "start" };
  const _endEvent    = { type: "end" };
  const EPS = 0.000001;
  const twoPI = 2 * Math.PI;

  const STATE = { NONE:-1, ROTATE:0, DOLLY:1, PAN:2,
    TOUCH_ROTATE:3, TOUCH_PAN:4, TOUCH_DOLLY_PAN:5, TOUCH_DOLLY_ROTATE:6 };

  THREE.OrbitControls = function (object, domElement) {
    // Mixin EventDispatcher first so dispatchEvent is available everywhere
    Object.assign(this, THREE.EventDispatcher.prototype);
    if (domElement === undefined) console.warn('THREE.OrbitControls: The second parameter "domElement" is now mandatory.');
    if (domElement === document) console.error('THREE.OrbitControls: "document" should not be used as the target "domElement". Please use "renderer.domElement" instead.');
    this.object = object;
    this.domElement = domElement;
    this.enabled = true;
    this.target = new THREE.Vector3();
    this.minDistance = 0;
    this.maxDistance = Infinity;
    this.minZoom = 0;
    this.maxZoom = Infinity;
    this.minPolarAngle = 0;
    this.maxPolarAngle = Math.PI;
    this.minAzimuthAngle = -Infinity;
    this.maxAzimuthAngle = Infinity;
    this.enableDamping = false;
    this.dampingFactor = 0.05;
    this.enableZoom = true;
    this.zoomSpeed = 1.0;
    this.enableRotate = true;
    this.rotateSpeed = 1.0;
    this.enablePan = true;
    this.panSpeed = 1.0;
    this.screenSpacePanning = true;
    this.keyPanSpeed = 7.0;
    this.autoRotate = false;
    this.autoRotateSpeed = 2.0;
    this.keys = { LEFT:'ArrowLeft', UP:'ArrowUp', RIGHT:'ArrowRight', BOTTOM:'ArrowDown' };
    this.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
    this.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
    this.target0 = this.target.clone();
    this.position0 = this.object.position.clone();
    this.zoom0 = this.object.zoom;
    this._domElementKeyEvents = null;

    const scope = this;
    const spherical = new THREE.Spherical();
    const sphericalDelta = new THREE.Spherical();
    let scale = 1;
    const panOffset = new THREE.Vector3();
    let zoomChanged = false;
    const rotateStart = new THREE.Vector2();
    const rotateEnd   = new THREE.Vector2();
    const rotateDelta = new THREE.Vector2();
    const panStart = new THREE.Vector2();
    const panEnd   = new THREE.Vector2();
    const panDelta = new THREE.Vector2();
    const dollyStart = new THREE.Vector2();
    const dollyEnd   = new THREE.Vector2();
    const dollyDelta = new THREE.Vector2();
    let state = STATE.NONE;
    const v = new THREE.Vector3();

    function getAutoRotationAngle() { return twoPI / 60 / 60 * scope.autoRotateSpeed; }
    function getZoomScale() { return Math.pow(0.95, scope.zoomSpeed); }
    function rotateLeft(angle)  { sphericalDelta.theta -= angle; }
    function rotateUp(angle)    { sphericalDelta.phi   -= angle; }

    const panLeft = (function() {
      const v = new THREE.Vector3();
      return function(distance, objectMatrix) {
        v.setFromMatrixColumn(objectMatrix, 0);
        v.multiplyScalar(-distance);
        panOffset.add(v);
      };
    }());
    const panUp = (function() {
      const v = new THREE.Vector3();
      return function(distance, objectMatrix) {
        if (scope.screenSpacePanning) {
          v.setFromMatrixColumn(objectMatrix, 1);
        } else {
          v.setFromMatrixColumn(objectMatrix, 0);
          v.crossVectors(scope.object.up, v);
        }
        v.multiplyScalar(distance);
        panOffset.add(v);
      };
    }());
    const pan = (function() {
      const offset = new THREE.Vector3();
      return function(deltaX, deltaY) {
        const element = scope.domElement;
        if (scope.object.isPerspectiveCamera) {
          const position = scope.object.position;
          offset.copy(position).sub(scope.target);
          let targetDistance = offset.length();
          targetDistance *= Math.tan((scope.object.fov / 2) * Math.PI / 180.0);
          panLeft(2 * deltaX * targetDistance / element.clientHeight, scope.object.matrix);
          panUp(2 * deltaY * targetDistance / element.clientHeight, scope.object.matrix);
        } else if (scope.object.isOrthographicCamera) {
          panLeft(deltaX * (scope.object.right - scope.object.left) / scope.object.zoom / element.clientWidth, scope.object.matrix);
          panUp(deltaY * (scope.object.top - scope.object.bottom) / scope.object.zoom / element.clientHeight, scope.object.matrix);
        }
      };
    }());

    function dollyOut(dollyScale) { scale /= dollyScale; }
    function dollyIn(dollyScale)  { scale *= dollyScale; }

    this.update = (function() {
      const offset = new THREE.Vector3();
      const quat = new THREE.Quaternion().setFromUnitVectors(object.up, new THREE.Vector3(0,1,0));
      const quatInverse = quat.clone().invert();
      const lastPosition = new THREE.Vector3();
      const lastQuaternion = new THREE.Quaternion();
      return function update() {
        const position = scope.object.position;
        offset.copy(position).sub(scope.target);
        offset.applyQuaternion(quat);
        spherical.setFromVector3(offset);
        if (scope.autoRotate && state === STATE.NONE) rotateLeft(getAutoRotationAngle());
        if (scope.enableDamping) {
          spherical.theta += sphericalDelta.theta * scope.dampingFactor;
          spherical.phi   += sphericalDelta.phi   * scope.dampingFactor;
        } else {
          spherical.theta += sphericalDelta.theta;
          spherical.phi   += sphericalDelta.phi;
        }
        let min = scope.minAzimuthAngle, max = scope.maxAzimuthAngle;
        if (isFinite(min) && isFinite(max)) {
          if (min < -Math.PI) min += twoPI; else if (min > Math.PI) min -= twoPI;
          if (max < -Math.PI) max += twoPI; else if (max > Math.PI) max -= twoPI;
          spherical.theta = (min <= max) ?
            Math.max(min, Math.min(max, spherical.theta)) :
            (spherical.theta > (min + max) / 2 ? Math.max(min, spherical.theta) : Math.min(max, spherical.theta));
        }
        spherical.phi = Math.max(scope.minPolarAngle, Math.min(scope.maxPolarAngle, spherical.phi));
        spherical.makeSafe();
        spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius * scale));
        if (scope.enableDamping) scope.target.addScaledVector(panOffset, scope.dampingFactor);
        else scope.target.add(panOffset);
        offset.setFromSpherical(spherical);
        offset.applyQuaternion(quatInverse);
        position.copy(scope.target).add(offset);
        scope.object.lookAt(scope.target);
        if (scope.enableDamping) {
          sphericalDelta.theta *= (1 - scope.dampingFactor);
          sphericalDelta.phi   *= (1 - scope.dampingFactor);
          panOffset.multiplyScalar(1 - scope.dampingFactor);
        } else {
          sphericalDelta.set(0,0,0);
          panOffset.set(0,0,0);
        }
        scale = 1;
        if (zoomChanged || lastPosition.distanceToSquared(scope.object.position) > EPS ||
            8 * (1 - lastQuaternion.dot(scope.object.quaternion)) > EPS) {
          scope.dispatchEvent(_changeEvent);
          lastPosition.copy(scope.object.position);
          lastQuaternion.copy(scope.object.quaternion);
          zoomChanged = false;
          return true;
        }
        return false;
      };
    }());

    this.saveState = function() {
      scope.target0.copy(scope.target);
      scope.position0.copy(scope.object.position);
      scope.zoom0 = scope.object.zoom;
    };
    this.reset = function() {
      scope.target.copy(scope.target0);
      scope.object.position.copy(scope.position0);
      scope.object.zoom = scope.zoom0;
      scope.object.updateProjectionMatrix();
      scope.dispatchEvent(_changeEvent);
      scope.update();
      state = STATE.NONE;
    };
    this.listenToKeyEvents = function(domElement) {
      domElement.addEventListener('keydown', onKeyDown);
      scope._domElementKeyEvents = domElement;
    };
    this.dispose = function() {
      scope.domElement.removeEventListener('contextmenu', onContextMenu);
      scope.domElement.removeEventListener('mousedown', onMouseDown);
      scope.domElement.removeEventListener('wheel', onMouseWheel);
      scope.domElement.removeEventListener('touchstart', onTouchStart);
      scope.domElement.removeEventListener('touchend', onTouchEnd);
      scope.domElement.removeEventListener('touchmove', onTouchMove);
      scope.domElement.ownerDocument.removeEventListener('mousemove', onMouseMove);
      scope.domElement.ownerDocument.removeEventListener('mouseup', onMouseUp);
      if (scope._domElementKeyEvents !== null) scope._domElementKeyEvents.removeEventListener('keydown', onKeyDown);
    };

    function handleMouseDownRotate(e) { rotateStart.set(e.clientX, e.clientY); }
    function handleMouseDownDolly(e)  { dollyStart.set(e.clientX, e.clientY); }
    function handleMouseDownPan(e)    { panStart.set(e.clientX, e.clientY); }
    function handleMouseMoveRotate(e) {
      rotateEnd.set(e.clientX, e.clientY);
      rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
      const element = scope.domElement;
      rotateLeft(twoPI * rotateDelta.x / element.clientHeight);
      rotateUp(twoPI * rotateDelta.y / element.clientHeight);
      rotateStart.copy(rotateEnd);
      scope.update();
    }
    function handleMouseMoveDolly(e) {
      dollyEnd.set(e.clientX, e.clientY);
      dollyDelta.subVectors(dollyEnd, dollyStart);
      if (dollyDelta.y > 0) dollyOut(getZoomScale());
      else if (dollyDelta.y < 0) dollyIn(getZoomScale());
      dollyStart.copy(dollyEnd);
      scope.update();
    }
    function handleMouseMovePan(e) {
      panEnd.set(e.clientX, e.clientY);
      panDelta.subVectors(panEnd, panStart).multiplyScalar(scope.panSpeed);
      pan(panDelta.x, panDelta.y);
      panStart.copy(panEnd);
      scope.update();
    }
    function handleMouseWheel(e) {
      if (e.deltaY < 0) dollyIn(getZoomScale());
      else if (e.deltaY > 0) dollyOut(getZoomScale());
      scope.update();
    }
    function handleKeyDown(e) {
      let needsUpdate = false;
      switch (e.code) {
        case scope.keys.UP:     pan(0,  scope.keyPanSpeed); needsUpdate = true; break;
        case scope.keys.BOTTOM: pan(0, -scope.keyPanSpeed); needsUpdate = true; break;
        case scope.keys.LEFT:   pan( scope.keyPanSpeed, 0); needsUpdate = true; break;
        case scope.keys.RIGHT:  pan(-scope.keyPanSpeed, 0); needsUpdate = true; break;
      }
      if (needsUpdate) { e.preventDefault(); scope.update(); }
    }
    function handleTouchStartRotate(e) {
      if (e.touches.length === 1) rotateStart.set(e.touches[0].pageX, e.touches[0].pageY);
      else {
        const x = 0.5*(e.touches[0].pageX+e.touches[1].pageX);
        const y = 0.5*(e.touches[0].pageY+e.touches[1].pageY);
        rotateStart.set(x,y);
      }
    }
    function handleTouchStartPan(e) {
      if (e.touches.length === 1) panStart.set(e.touches[0].pageX, e.touches[0].pageY);
      else {
        const x = 0.5*(e.touches[0].pageX+e.touches[1].pageX);
        const y = 0.5*(e.touches[0].pageY+e.touches[1].pageY);
        panStart.set(x,y);
      }
    }
    function handleTouchStartDolly(e) {
      const dx = e.touches[0].pageX - e.touches[1].pageX;
      const dy = e.touches[0].pageY - e.touches[1].pageY;
      dollyStart.set(0, Math.sqrt(dx*dx+dy*dy));
    }
    function handleTouchStartDollyPan(e) {
      if (scope.enableZoom) handleTouchStartDolly(e);
      if (scope.enablePan)  handleTouchStartPan(e);
    }
    function handleTouchMoveRotate(e) {
      if (e.touches.length === 1) rotateEnd.set(e.touches[0].pageX, e.touches[0].pageY);
      else {
        const x = 0.5*(e.touches[0].pageX+e.touches[1].pageX);
        const y = 0.5*(e.touches[0].pageY+e.touches[1].pageY);
        rotateEnd.set(x,y);
      }
      rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
      const element = scope.domElement;
      rotateLeft(twoPI * rotateDelta.x / element.clientHeight);
      rotateUp(twoPI * rotateDelta.y / element.clientHeight);
      rotateStart.copy(rotateEnd);
    }
    function handleTouchMovePan(e) {
      if (e.touches.length === 1) panEnd.set(e.touches[0].pageX, e.touches[0].pageY);
      else {
        const x = 0.5*(e.touches[0].pageX+e.touches[1].pageX);
        const y = 0.5*(e.touches[0].pageY+e.touches[1].pageY);
        panEnd.set(x,y);
      }
      panDelta.subVectors(panEnd, panStart).multiplyScalar(scope.panSpeed);
      pan(panDelta.x, panDelta.y);
      panStart.copy(panEnd);
    }
    function handleTouchMoveDolly(e) {
      const dx = e.touches[0].pageX - e.touches[1].pageX;
      const dy = e.touches[0].pageY - e.touches[1].pageY;
      dollyEnd.set(0, Math.sqrt(dx*dx+dy*dy));
      dollyDelta.set(0, Math.pow(dollyEnd.y/dollyStart.y, scope.zoomSpeed));
      dollyOut(dollyDelta.y);
      dollyStart.copy(dollyEnd);
    }
    function handleTouchMoveDollyPan(e) {
      if (scope.enableZoom) handleTouchMoveDolly(e);
      if (scope.enablePan)  handleTouchMovePan(e);
    }

    function onMouseDown(e) {
      if (!scope.enabled) return;
      e.preventDefault();
      switch (scope.mouseButtons[['LEFT','MIDDLE','RIGHT'][e.button]]) {
        case THREE.MOUSE.ROTATE:
          if (e.ctrlKey||e.metaKey||e.shiftKey) { handleMouseDownPan(e); state=STATE.PAN; }
          else { handleMouseDownRotate(e); state=STATE.ROTATE; }
          break;
        case THREE.MOUSE.DOLLY: handleMouseDownDolly(e); state=STATE.DOLLY; break;
        case THREE.MOUSE.PAN:
          if (e.ctrlKey||e.metaKey||e.shiftKey) { handleMouseDownRotate(e); state=STATE.ROTATE; }
          else { handleMouseDownPan(e); state=STATE.PAN; }
          break;
      }
      if (state !== STATE.NONE) {
        scope.domElement.ownerDocument.addEventListener('mousemove', onMouseMove);
        scope.domElement.ownerDocument.addEventListener('mouseup', onMouseUp);
        scope.dispatchEvent(_startEvent);
      }
    }
    function onMouseMove(e) {
      if (!scope.enabled) return;
      e.preventDefault();
      if (state===STATE.ROTATE) handleMouseMoveRotate(e);
      else if (state===STATE.DOLLY)  handleMouseMoveDolly(e);
      else if (state===STATE.PAN)    handleMouseMovePan(e);
    }
    function onMouseUp(e) {
      scope.domElement.ownerDocument.removeEventListener('mousemove', onMouseMove);
      scope.domElement.ownerDocument.removeEventListener('mouseup', onMouseUp);
      scope.dispatchEvent(_endEvent);
      state = STATE.NONE;
    }
    function onMouseWheel(e) {

    wheelMat.color.set(sw.dataset.color);
  });

  // Sliders
  function wireSlider(id, valId, cb) {
    const input = document.getElementById(id);
    const valEl = document.getElementById(valId);
    input.addEventListener('input', () => {
      const v = input.value / 100;
      valEl.textContent = v.toFixed(2);
      cb(v);
    });
  }
  wireSlider('roughness',  'roughness-val',  v => { bodyMat.roughness = v; });
  wireSlider('clearcoat',  'clearcoat-val',  v => { bodyMat.clearcoat = v; });
  wireSlider('metalness',  'metalness-val',  v => { bodyMat.metalness = v; });

  // Camera presets
  document.getElementById('btn-front').addEventListener('click', () =>
    lerpCamera(new THREE.Vector3(-6, 2, 0), new THREE.Vector3(0, 0.8, 0), 1.2)
  );
  document.getElementById('btn-side').addEventListener('click', () =>
    lerpCamera(new THREE.Vector3(0, 2, 8), new THREE.Vector3(0, 0.8, 0), 1.2)
  );
  document.getElementById('btn-top').addEventListener('click', () =>
    lerpCamera(new THREE.Vector3(0, 10, 1), new THREE.Vector3(0, 0, 0), 1.2)
  );

  // Auto rotate toggle
  let autoRot = false;
  const btnAutoRot = document.getElementById('btn-autorotate');
  btnAutoRot.addEventListener('click', () => {
    autoRot = !autoRot;
    controls.autoRotate = autoRot;
    btnAutoRot.classList.toggle('active', autoRot);
  });

  // Reset
  document.getElementById('btn-reset').addEventListener('click', () => {
    lerpCamera(new THREE.Vector3(7, 3, 7), new THREE.Vector3(0, 0.8, 0), 1.0);
  });

  // Environment
  const studioEnv = buildEnvStudio();
  let nightEnv = null;
  function buildNightEnv() {
    // dark reddish studio
    const s = new THREE.Scene();
    s.background = new THREE.Color(0x080410);
    const l = new THREE.AmbientLight(0x220022, 5);
    s.add(l);
    return pmremGenerator.fromScene(s).texture;
  }

  document.getElementById('env-studio').addEventListener('click', function () {
    scene.environment = studioEnv;
    scene.background = new THREE.Color(0x0d0d18);
    scene.fog = new THREE.FogExp2(0x0d0d18, 0.04);
    ambient.intensity = 0.8;
    ambient.color.set(0x112244);
    mainLight.intensity = 2.5;
    document.getElementById('env-studio').classList.add('active');
    document.getElementById('env-night').classList.remove('active');
  });

  document.getElementById('env-night').addEventListener('click', function () {
    if (!nightEnv) nightEnv = buildNightEnv();
    scene.environment = nightEnv;
    scene.background = new THREE.Color(0x02020a);
    scene.fog = new THREE.FogExp2(0x02020a, 0.05);
    ambient.intensity = 0.2;
    ambient.color.set(0x0a0520);
    mainLight.intensity = 0.6;
    document.getElementById('env-night').classList.add('active');
    document.getElementById('env-studio').classList.remove('active');
  });

  // ────────────────────────────────────────────
  //  Resize
  // ────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Dismiss loading screen ──
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 800);

  // ────────────────────────────────────────────
  //  Animation loop
  // ────────────────────────────────────────────
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Camera lerp
    if (camTarget) {
      camProgress = Math.min(1, camProgress + delta / camTarget.duration);
      const t = 1 - Math.pow(1 - camProgress, 3); // ease-out-cubic
      camera.position.lerpVectors(camFrom.pos, camTarget.pos, t);
      controls.target.lerpVectors(camFrom.tgt, camTarget.tgt, t);
      if (camProgress >= 1) camTarget = null;
    }

    // Rotate wheels while auto-rotate is on
    const wheelSpeed = autoRot ? elapsed * 2.5 : 0;
    wheelMeshes.forEach(w => { w.rotation.z = -wheelSpeed; });

    // Drift grid
    grid.position.x = (elapsed * 0.4) % 1;

    // Animate dust particles
    const pPos = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      pPos[i*3+1] -= delta * 0.12;
      if (pPos[i*3+1] < 0) pPos[i*3+1] = 8;
    }
    particleGeo.attributes.position.needsUpdate = true;

    controls.update();
    renderer.render(scene, camera);
  }

  animate();
}());
</script>
</body>
</html>
